# https://github.com/lowlighter/metrics
name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push: {branches: ["main", "master"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:

      # Fixes "sha wasn't supplied" error
      - name: 📥 Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # ── LEFT: Header + Base Stats ──
      - name: 🦑 Header
        if: ${{ success() || failure() }}
        uses: lowlighter/metrics@latest
        with:
          filename: header.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: Roshan1299
          base: header, activity, community, repositories, metadata
          base_indepth: yes
          config_timezone: America/Edmonton

      # ── LEFT: Notable Contributions ──
      - name: 🦑 Notable Contributions
        if: ${{ success() || failure() }}
        uses: lowlighter/metrics@latest
        with:
          filename: notable.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: Roshan1299
          base: ""
          plugin_notable: yes
          plugin_notable_indepth: yes
          plugin_notable_from: all
          plugin_notable_types: commit, pull_request, issue
          plugin_notable_self: yes

      # ── RIGHT: Tech Icons (Starred Topics) ──
      - name: 🦑 Tech Icons
        if: ${{ success() || failure() }}
        uses: lowlighter/metrics@latest
        with:
          filename: topics.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: Roshan1299
          base: ""
          plugin_topics: yes
          plugin_topics_mode: icons
          plugin_topics_limit: 0
          plugin_topics_sort: starred

      # ── RIGHT: Isometric Contributions Calendar ──
      - name: 🦑 Isocalendar
        if: ${{ success() || failure() }}
        uses: lowlighter/metrics@latest
        with:
          filename: isocalendar.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: Roshan1299
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
