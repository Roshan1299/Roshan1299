# Visit https://github.com/lowlighter/metrics for full documentation
# This workflow generates metrics SVG images and commits them to your repo

name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push: {branches: ["main", "master"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:

      # ==============================================
      # LEFT — Header + Base Stats + Coding Habits + Topics
      # ==============================================
      - name: 🦑 Header + Habits + Topics
        if: ${{ success() || failure() }}
        uses: lowlighter/metrics@latest
        with:
          filename: header.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: Roshan1299
          base: header, activity, community, repositories, metadata
          base_indepth: yes
          config_order: base.header, base.activity, base.community, base.repositories, base.metadata, habits, topics
          config_timezone: America/Edmonton
          # Coding habits (commit time charts + activity per day)
          plugin_habits: yes
          plugin_habits_charts: yes
          plugin_habits_facts: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_charts_type: classic
          # Mastered technologies & topics (icon grid)
          plugin_topics: yes
          plugin_topics_mode: icons
          plugin_topics_limit: 0
          plugin_topics_sort: stars

      # ==============================================
      # RIGHT — PageSpeed Insights
      # ==============================================
      - name: 🦑 PageSpeed
        if: ${{ success() || failure() }}
        uses: lowlighter/metrics@latest
        with:
          filename: pagespeed.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: Roshan1299
          base: ""
          plugin_pagespeed: yes
          plugin_pagespeed_detailed: yes
          plugin_pagespeed_url: https://roshanb-portfolio.vercel.app/

      # ==============================================
      # RIGHT — Isometric Contributions Calendar
      # ==============================================
      - name: 🦑 Isocalendar
        if: ${{ success() || failure() }}
        uses: lowlighter/metrics@latest
        with:
          filename: isocalendar.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: Roshan1299
          base: ""
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year

      # ==============================================
      # RIGHT — Most Used Languages
      # ==============================================
      - name: 🦑 Languages
        if: ${{ success() || failure() }}
        uses: lowlighter/metrics@latest
        with:
          filename: languages.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: Roshan1299
          base: ""
          plugin_languages: yes
          plugin_languages_details: lines, bytes-size, percentage
          plugin_languages_sections: most-used, recently-used
          plugin_languages_indepth: yes
          plugin_languages_limit: 8
          plugin_languages_ignored: html, css, tex, less, dockerfile, makefile, shell
